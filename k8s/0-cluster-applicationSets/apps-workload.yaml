apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-workload
  namespace: argocd
spec:
  goTemplate: true
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/syncPolicy
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  type: workload
          - git:
              repoURL: git@github.com:vFondevilla/k8s-homelab.git
              revision: main
              directories:
                - path: k8s/apps/*/overlays/workload
  template:
    metadata:
      name: '{{.name}}-{{ index (splitList "/" .path.path) 2 }}'
    spec:
      project: default
      destination:
        server: "{{.server}}"
      source:
        repoURL: git@github.com:vFondevilla/k8s-homelab.git
        targetRevision: main
        path: "{{.path.path}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
