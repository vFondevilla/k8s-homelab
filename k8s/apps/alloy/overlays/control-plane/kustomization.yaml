apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: alloy
resources:
  - ../../bases
patches:
  - target:
      kind: ConfigMap
      name: alloy
    patch: |-
      - op: add
        path: /metadata/namespace
        value: alloy
  - target:
      kind: Service
      name: alloy
    patch: |-
      - op: add
        path: /metadata/namespace
        value: alloy
  - target:
      group: apps
      version: v1
      kind: DaemonSet
      name: alloy
    patch: |-
      - op: add
        path: /metadata/namespace
        value: alloy
