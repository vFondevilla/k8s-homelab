apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zigbee2mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zigbee2mqtt
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: zigbee2mqtt
        app.kubernetes.io/name: zigbee2mqtt
        app: zigbee2mqtt
    spec:
      dnsPolicy: ClusterFirst
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -s /app/data/configuration.yaml ] || ! grep -Eq '^[[:space:]]*(homeassistant|mqtt|serial|frontend|advanced|devices|groups):' /app/data/configuration.yaml; then
                if [ -e /app/data/configuration.yaml ]; then
                  cp /app/data/configuration.yaml /app/data/configuration.yaml.invalid
                fi
                cp /config/configuration.yaml /app/data/configuration.yaml
              fi
          volumeMounts:
            - mountPath: /config
              name: config-volume
              readOnly: true
            - mountPath: /app/data
              name: data-volume
      containers:
        - name: zigbee2mqtt
          image: koenkk/zigbee2mqtt
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
            privileged: true
          env:
            - name: TZ
              value: UTC
          ports:
            - containerPort: 8080
              name: web
              protocol: TCP
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          volumeMounts:
            - mountPath: /app/data/
              name: data-volume
          resources:
            limits:
              cpu: 200m
              memory: 600Mi
            requests:
              cpu: 200m
              memory: 600Mi
      volumes:
        - name: config-volume
          configMap:
            name: zigbee2mqtt
  volumeClaimTemplates:
    - metadata:
        name: data-volume
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: manual
        volumeName: zigbee2mqtt
        resources:
          requests:
            storage: 2Gi
