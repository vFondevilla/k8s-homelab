apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
# - argocd-cm.yaml
- ingress.yml
- 01-namespace.yaml
# - install.yaml
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.8/manifests/install.yaml
- dex-google-externalsecret.yaml
- in-cluster-secret.yaml
# - workload-cluster-secret.yaml

patches:
  - path: argocd-cm.yaml
    target:
      version: v1
      kind: ConfigMap
      name: argocd-cm
  - path: argocd-rbac-cm.yaml
    target:
      version: v1
      kind: ConfigMap
      name: argocd-rbac-cm
  - path: argocd-server-lb.yaml
    target:
      version: v1
      kind: Service
      name: argocd-server
  - path: argocd-cmd-params-cm.yaml
    target:
      version: v1
      kind: ConfigMap
      name: argocd-cmd-params-cm
