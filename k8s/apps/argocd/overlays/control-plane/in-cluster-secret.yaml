  apiVersion: v1  
  kind: Secret
  metadata:                                                                                    
    name: in-cluster
    namespace: argocd                                                                          
    labels:       
      argocd.argoproj.io/secret-type: cluster
      type: control-plane        # your selector label
  stringData:                                                                                  
    name: in-cluster
    server: https://kubernetes.default.svc                                                     
    config: |     
      {
        "tlsClientConfig": {
          "insecure": false
        }                                                                                      
      }