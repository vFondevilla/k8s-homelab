apiVersion: v1
kind: PersistentVolume
metadata:
  name: actualbudget-data
  labels:
    app.kubernetes.io/name: actualbudget
    app.kubernetes.io/component: server
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 10.1.0.4
    path: /mnt/SSD/actual-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actualbudget-data
  namespace: actualbudget
  labels:
    app.kubernetes.io/name: actualbudget
    app.kubernetes.io/component: server
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 10Gi
  volumeName: actualbudget-data
