apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mosquitto
  namespace: argocd
spec:
  destination:
    namespace: mosquitto
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: git@github.com:vFondevilla/k8s-homelab.git
    targetRevision: HEAD
    path: k8s/apps/mosquitto/overlays/control-plane
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
