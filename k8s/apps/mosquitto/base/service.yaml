apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  annotations:
    external-dns.alpha.kubernetes.io/hostname: mosquitto.apps.fondevilla.io
spec:
  type: LoadBalancer
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
      protocol: TCP
    - name: websocket
      port: 9090
      targetPort: websocket
      protocol: TCP
  selector:
    app.kubernetes.io/name: mosquitto
    app.kubernetes.io/instance: mosquitto
