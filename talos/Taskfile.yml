# https://taskfile.dev
version: "3"
tasks:
    default:
        cmds:
            - task --list
        silent: true

    gen-workload-cluster:
        desc: Generate Talos configs for workload-cluster from encrypted secrets bundle
        cmds:
            - >-
                sops exec-file workload-cluster/secrets.yaml
                'talosctl gen config homelab https://k8s.fondevilla.io:6443
                --with-secrets {}
                --config-patch-control-plane @workload-cluster/patches/controlplane.yaml
                --output-dir workload-cluster
                --force'

    gen-control-cluster-v2:
        desc: Generate Talos configs for control-cluster-v2 from encrypted secrets bundle
        cmds:
            - >-
                sops exec-file control-cluster-v2/secrets.yaml
                'talosctl gen config control-plane https://10.1.0.10:6443
                --with-secrets {}
                --config-patch-control-plane @control-cluster-v2/patches/controlplane.yaml
                --output-dir control-cluster-v2
                --force'
            - cat control-cluster-v2/patches/extensions/*.yaml >> control-cluster-v2/controlplane.yaml
